<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Quest - Apply</title>
    <link rel="stylesheet" href="apply.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <h1>JOB QUEST</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="jobs.html">Jobs</a>
            <a href="post-job.html">Post Job</a>
        </nav>
    </header>

    <main class="form-container">
        <div class="form-card">
            <h2>Apply for Job</h2>
            
            <form id="applicationForm">
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" placeholder="example@domain.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="e.g. 677123456">
                </div>

                <div class="form-group">
                    <label for="cvFile">Upload CV</label>
                    <input type="file" id="cvFile">
                </div>

                <button type="submit" class="submit-btn">Submit Application</button>
            </form>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
